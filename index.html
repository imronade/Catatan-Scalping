<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catatan Scalping</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222636;
    --border: #2e334a;
    --accent: #4f8ef7;
    --accent2: #7c5cfc;
    --green: #2ecc71;
    --red: #e74c3c;
    --yellow: #f1c40f;
    --text: #e8eaf0;
    --muted: #7a8099;
    --mono: 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 20px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .logo-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
  }
  header span {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 20px;
    align-items: start;
  }

  /* PANEL */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
  }
  .panel-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* FORM */
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 5px;
  }
  .field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(79,142,247,0.12);
  }
  .field input::placeholder { color: var(--muted); }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .btn-add {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 7px;
    padding: 10px;
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: opacity 0.15s, transform 0.1s;
    margin-top: 4px;
  }
  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  .btn-clear {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .btn-clear:hover { border-color: var(--red); color: var(--red); }

  /* INFO BADGES */
  .live-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .badge {
    font-size: 11px;
    font-family: var(--mono);
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 600;
  }
  .badge-blue { background: rgba(79,142,247,0.15); color: var(--accent); border: 1px solid rgba(79,142,247,0.3); }
  .badge-green { background: rgba(46,204,113,0.12); color: var(--green); border: 1px solid rgba(46,204,113,0.25); }
  .badge-red { background: rgba(231,76,60,0.12); color: var(--red); border: 1px solid rgba(231,76,60,0.25); }
  .badge-yellow { background: rgba(241,196,15,0.1); color: var(--yellow); border: 1px solid rgba(241,196,15,0.2); }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12.5px;
  }
  thead tr {
    background: var(--surface2);
  }
  th {
    padding: 9px 12px;
    text-align: right;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  th:first-child, th:nth-child(2) { text-align: left; }

  tbody tr {
    border-bottom: 1px solid rgba(46,51,74,0.5);
    transition: background 0.1s;
  }
  tbody tr:hover { background: rgba(255,255,255,0.025); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 10px 12px;
    text-align: right;
    white-space: nowrap;
  }
  td:first-child { text-align: left; color: var(--muted); font-size: 11px; }
  td:nth-child(2) { text-align: left; font-weight: 700; color: var(--accent); font-size: 13px; }

  .num { color: var(--text); }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .zero { color: var(--muted); }

  /* Selisih badge */
  .selisih-cell span {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
  }
  .selisih-neg span { background: rgba(231,76,60,0.15); color: var(--red); }
  .selisih-pos span { background: rgba(46,204,113,0.12); color: var(--green); }
  .selisih-zero span { background: rgba(122,128,153,0.12); color: var(--muted); }
  .selisih-first span { background: rgba(232,234,240,0.07); color: var(--text); }

  /* Delete btn */
  .del-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    transition: color 0.15s;
    line-height: 1;
  }
  .del-btn:hover { color: var(--red); }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-icon { font-size: 32px; margin-bottom: 8px; }

  /* SUMMARY ROW */
  .summary-row td {
    font-size: 11px;
    color: var(--muted);
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  /* TICKER CHIP in header */
  .ticker-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
  }
  .ticker-chip {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    cursor: pointer;
    transition: all 0.12s;
  }
  .ticker-chip.active {
    background: rgba(79,142,247,0.18);
    border-color: var(--accent);
    color: var(--accent);
  }
  .ticker-chip:hover:not(.active) { border-color: var(--accent2); }

  /* Time label */
  .time-label { color: var(--muted); }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo-dot"></div>
  <h1>Catatan Scalping</h1>
</header>

<div class="layout">

  <!-- INPUT PANEL -->
  <div class="panel">
    <div class="panel-title">Input Data</div>

    <div class="field">
      <label>Kode Saham</label>
      <input type="text" id="inp-kode" placeholder="Contoh: RATU" maxlength="10"
             style="text-transform:uppercase">
    </div>
    <div class="field">
      <label>AVG (harga rata-rata)</label>
      <input type="text" id="inp-avg" placeholder="4.712" inputmode="numeric">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Slot (jumlah lot)</label>
        <input type="text" id="inp-slot" placeholder="7.976" inputmode="numeric">
      </div>
      <div class="field">
        <label>Blot (jumlah lot)</label>
        <input type="text" id="inp-blot" placeholder="7.429" inputmode="numeric">
      </div>
    </div>

    <button class="btn-add" onclick="addRow()">+ Tambah Entri</button>
    <button class="btn-clear" onclick="clearAll()">Hapus Semua Data</button>
  </div>

  <!-- TABLE PANEL -->
  <div class="panel">
    <div class="panel-title">Log Broker Flow</div>

    <div id="ticker-filter" class="ticker-group"></div>

    <div class="table-wrap">
      <table id="flow-table">
        <thead>
          <tr>
            <th>Waktu</th>
            <th>Kode</th>
            <th>AVG</th>
            <th>Slot</th>
            <th>Blot</th>
            <th>Δ Slot</th>
            <th>Δ Blot</th>
            <th>Selisih</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="flow-body">
          <tr>
            <td colspan="9">
              <div class="empty">
                <div class="empty-icon">📊</div>
                Belum ada data. Masukkan kode saham, AVG, Slot, dan Blot.
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="summary-badges" class="live-badges" style="margin-top:14px;"></div>
  </div>

</div>

<script>
  // ─── State ───────────────────────────────────────────────────────────────
  let rows = [];       // { id, time, kode, avg, slot, blot }
  let activeFilter = null;

  // ─── Helpers ─────────────────────────────────────────────────────────────
  function fmt(n) {
    if (n === null || n === undefined || isNaN(n)) return '—';
    return Math.abs(n).toLocaleString('id-ID');
  }
  function fmtSigned(n) {
    if (n === null || isNaN(n)) return '—';
    return (n >= 0 ? '+' : '') + n.toLocaleString('id-ID');
  }
  function parseNum(s) {
    // Remove dots (thousands separator) and replace comma with dot
    return parseInt(s.replace(/\./g, '').replace(',', '.')) || 0;
  }
  function fmtInput(el) {
    let raw = el.value.replace(/\D/g, '');
    if (!raw) { el.value = ''; return; }
    el.value = parseInt(raw).toLocaleString('id-ID');
  }
  function now() {
    const d = new Date();
    const hh = String(d.getHours()).padStart(2,'0');
    const mm = String(d.getMinutes()).padStart(2,'0');
    const ss = String(d.getSeconds()).padStart(2,'0');
    return `${hh}:${mm}:${ss}`;
  }
  function uniqueId() {
    return Date.now() + Math.random().toString(36).slice(2);
  }

  // ─── Format-on-input ─────────────────────────────────────────────────────
  ['inp-avg','inp-slot','inp-blot'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', () => fmtInput(el));
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') addRow();
    });
  });
  document.getElementById('inp-kode').addEventListener('keydown', e => {
    document.getElementById('inp-kode').value =
      document.getElementById('inp-kode').value.toUpperCase();
    if (e.key === 'Enter') document.getElementById('inp-avg').focus();
  });
  document.getElementById('inp-kode').addEventListener('input', e => {
    e.target.value = e.target.value.toUpperCase();
  });

  // ─── Add Row ─────────────────────────────────────────────────────────────
  function addRow() {
    const kode = document.getElementById('inp-kode').value.trim().toUpperCase();
    const avg  = parseNum(document.getElementById('inp-avg').value);
    const slot = parseNum(document.getElementById('inp-slot').value);
    const blot = parseNum(document.getElementById('inp-blot').value);

    if (!kode) { highlight('inp-kode'); return; }
    if (!avg)  { highlight('inp-avg');  return; }
    if (!slot) { highlight('inp-slot'); return; }
    if (!blot) { highlight('inp-blot'); return; }

    rows.push({ id: uniqueId(), time: now(), kode, avg, slot, blot });

    // clear all inputs
    document.getElementById('inp-kode').value = '';
    document.getElementById('inp-avg').value  = '';
    document.getElementById('inp-slot').value = '';
    document.getElementById('inp-blot').value = '';
    document.getElementById('inp-kode').focus();

    render();
  }

  function highlight(id) {
    const el = document.getElementById(id);
    el.style.borderColor = 'var(--red)';
    el.focus();
    setTimeout(() => el.style.borderColor = '', 800);
  }

  // ─── Delete ───────────────────────────────────────────────────────────────
  function deleteRow(id) {
    rows = rows.filter(r => r.id !== id);
    render();
  }

  // ─── Clear All ────────────────────────────────────────────────────────────
  function clearAll() {
    if (rows.length === 0) return;
    if (!confirm('Hapus semua data?')) return;
    rows = [];
    activeFilter = null;
    render();
  }

  // ─── Compute deltas ──────────────────────────────────────────────────────
  function computeDeltas(filtered) {
    // Compute Δ per kode, comparing to previous entry of same kode
    const prevByKode = {};
    return filtered.map(r => {
      const prev = prevByKode[r.kode];
      const dSlot  = prev ? r.slot - prev.slot : 0;
      const dBlot  = prev ? r.blot - prev.blot : 0;
      const selisih = r.blot - r.slot;
      // avgDir: 'up' | 'down' | 'same' | 'first'
      let avgDir = 'first';
      if (prev) {
        if (r.avg > prev.avg)      avgDir = 'up';
        else if (r.avg < prev.avg) avgDir = 'down';
        else                       avgDir = 'same';
      }
      prevByKode[r.kode] = r;
      return { ...r, dSlot, dBlot, selisih, isFirst: !prev, avgDir };
    });
  }

  // ─── Render ───────────────────────────────────────────────────────────────
  function render() {
    renderTickerFilter();
    renderTable();
    renderSummary();
  }

  function renderTickerFilter() {
    const codes = [...new Set(rows.map(r => r.kode))];
    const container = document.getElementById('ticker-filter');
    if (codes.length === 0) { container.innerHTML = ''; return; }
    let html = codes.map(k =>
      `<span class="ticker-chip ${activeFilter===k?'active':''}" onclick="toggleFilter('${k}')">${k}</span>`
    ).join('');
    if (activeFilter) html += `<span class="ticker-chip" onclick="toggleFilter(null)" style="color:var(--muted)">✕ Semua</span>`;
    container.innerHTML = html;
  }

  function toggleFilter(k) {
    activeFilter = (activeFilter === k) ? null : k;
    render();
  }

  function renderTable() {
    const body = document.getElementById('flow-body');
    const filtered = activeFilter ? rows.filter(r => r.kode === activeFilter) : rows;

    if (filtered.length === 0) {
      body.innerHTML = `<tr><td colspan="9"><div class="empty">
        <div class="empty-icon">📊</div>
        ${activeFilter ? 'Tidak ada data untuk ' + activeFilter : 'Belum ada data. Masukkan kode saham, AVG, Slot, dan Blot.'}
      </div></td></tr>`;
      return;
    }

    const withDelta = computeDeltas(filtered);

    let html = '';
    withDelta.forEach(r => {
      // Selisih: baris pertama = putih, pos = hijau, neg = merah
      const selClass = r.isFirst ? 'selisih-first' : r.selisih > 0 ? 'selisih-pos' : r.selisih < 0 ? 'selisih-neg' : 'selisih-zero';

      // AVG color: up = green, down = red, same = white, first = default text
      const avgColor = r.avgDir === 'up'   ? 'var(--green)'
                     : r.avgDir === 'down' ? 'var(--red)'
                     : r.avgDir === 'same' ? 'var(--text)'
                     : 'var(--text)';
      const avgWeight = r.avgDir !== 'first' ? '700' : '400';

      html += `<tr>
        <td class="time-label">${r.time}</td>
        <td>${r.kode}</td>
        <td class="num" style="color:${avgColor};font-weight:${avgWeight}">${fmt(r.avg)}</td>
        <td class="num">${fmt(r.slot)}</td>
        <td class="num">${fmt(r.blot)}</td>
        <td class="num">${r.isFirst ? '<span style="color:var(--muted)">—</span>' : fmtSigned(r.dSlot)}</td>
        <td class="num">${r.isFirst ? '<span style="color:var(--muted)">—</span>' : fmtSigned(r.dBlot)}</td>
        <td class="${selClass} selisih-cell"><span>${r.selisih > 0 ? '+' + fmt(r.selisih) : r.selisih < 0 ? '-' + fmt(Math.abs(r.selisih)) : fmt(r.selisih)}</span></td>
        <td><button class="del-btn" onclick="deleteRow('${r.id}')" title="Hapus baris">×</button></td>
      </tr>`;
    });

    body.innerHTML = html;
  }

  function renderSummary() {
    const container = document.getElementById('summary-badges');
    const filtered = activeFilter ? rows.filter(r => r.kode === activeFilter) : rows;
    if (filtered.length === 0) { container.innerHTML = ''; return; }

    const withDelta = computeDeltas(filtered);
    const last = withDelta[withDelta.length - 1];
    const totalDSlot = withDelta.reduce((s, r) => s + r.dSlot, 0);
    const totalDBlot = withDelta.reduce((s, r) => s + r.dBlot, 0);

    container.innerHTML = `
      <span class="badge badge-blue">Entri: ${filtered.length}</span>
      <span class="badge badge-${totalDSlot >= 0 ? 'green' : 'red'}">ΔSlot Total: ${fmtSigned(totalDSlot)}</span>
      <span class="badge badge-${totalDBlot >= 0 ? 'red' : 'green'}">ΔBlot Total: ${fmtSigned(totalDBlot)}</span>
      <span class="badge badge-${last.selisih > 0 ? 'green' : last.selisih < 0 ? 'red' : 'yellow'}">Selisih Terakhir: ${last.selisih > 0 ? '+' + fmt(last.selisih) : last.selisih < 0 ? '-' + fmt(Math.abs(last.selisih)) : fmt(last.selisih)}</span>
    `;
  }

  // ─── Init ─────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>
